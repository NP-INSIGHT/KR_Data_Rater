name: Notion Daily Analysis

on:
  schedule:
    - cron: '30 8 * * 1-5'  # UTC 08:30 = KST 17:30 (Chart Rater 30분 후)
  workflow_dispatch:
    inputs:
      provider:
        description: 'LLM provider'
        default: 'gemini'
        type: choice
        options:
          - claude
          - gemini
      list:
        description: 'Filter by list name (empty = all stocks)'
        required: false
        default: ''
      multi_temp:
        description: 'Enable multi-temperature analysis'
        type: boolean
        default: false
      temperatures:
        description: 'Temperature values (comma-separated, e.g. 0,0.3,0.7)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Install Korean font
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: Run analysis (dry-run, no Notion write yet)
        env:
          MPLBACKEND: Agg
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          LIST="${{ inputs.list }}"
          PROVIDER="${{ inputs.provider || 'gemini' }}"
          MULTI_TEMP="${{ inputs.multi_temp }}"
          TEMPS="${{ inputs.temperatures }}"
          CMD="python run_notion.py --provider $PROVIDER --dry-run"
          if [ -n "$LIST" ]; then
            CMD="$CMD --list $LIST"
          fi
          if [ "$MULTI_TEMP" = "true" ]; then
            CMD="$CMD --multi-temp"
          fi
          if [ -n "$TEMPS" ]; then
            CMD="$CMD --temperatures $(echo $TEMPS | tr ',' ' ')"
          fi
          eval $CMD

      - name: Commit charts to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f charts/ results/
          git diff --staged --quiet || git commit -m "chore: update charts $(date +%Y-%m-%d)"
          git pull --rebase origin main || git rebase --abort
          git push

      - name: Write Notion report (charts now available on GitHub)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          LIST="${{ inputs.list }}"
          PROVIDER="${{ inputs.provider || 'gemini' }}"
          CMD="python run_notion.py --provider $PROVIDER --report-only"
          if [ -n "$LIST" ]; then
            CMD="$CMD --list $LIST"
          fi
          eval $CMD

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
